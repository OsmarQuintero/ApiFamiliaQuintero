
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
<a [routerLink]="['home']" class="navbar-brand">
  <img src="logo.png"
       alt="Logo"
       width="100"
       height="60">
</a>



    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" [routerLink]="['home']">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [routerLink]="['familia']">familia</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" aria-disabled="true" [routerLink]="['acercade']">acerca de</a>
        </li>
      </ul>
      <div class="auth-actions">
        @if (auth.cargando()) {
          <span class="text-muted small">Verificando sesion...</span>
        } @else {
          @if (auth.usuario(); as usuario) {
            <div class="user-chip">
              @if (usuario.picture) {
                <img [src]="usuario.picture" [alt]="usuario.name" class="user-avatar">
              }
              <span>Hola, {{ usuario.name }}</span>
            </div>
            <button class="btn btn-outline-secondary btn-sm" type="button" (click)="cerrarSesion()">
              Cerrar sesion
            </button>
          } @else {
            <button class="btn google-login" type="button" (click)="iniciarSesion()">
              Iniciar sesion con Google
            </button>
          }
        }
      </div>
    </div>
  </div>
</nav>
